services:

  backend:
    build: ./backend
    container_name: portfolio-backend

  frontend:
    build: ./frontend
    container_name: portfolio-frontend

  nginx:
    image: nginx:latest
    container_name: portfolio-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend